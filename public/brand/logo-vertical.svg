<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <defs>
    <linearGradient id="grad-t-top" x1="16" y1="48" x2="80" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <linearGradient id="grad-t-stem" x1="48" y1="84" x2="48" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="100%" stop-color="#4F46E5" />
    </linearGradient>
    <linearGradient id="grad-star" x1="40" y1="28" x2="56" y2="12" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#7C3AED" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&amp;display=swap');
      .brand-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 700;
        font-size: 34px;
        fill: #0F172A;
        letter-spacing: -0.04em;
        text-anchor: middle;
      }
      .tagline-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-weight: 400;
        font-size: 10.5px;
        fill: #64748B;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Brand Symbol -->
  <g transform="translate(72, 10)">
    <!-- Stem of T -->
    <path d="M 40 56 H 56 V 76 A 8 8 0 0 1 40 76 Z" fill="url(#grad-t-stem)" />
    <!-- Top Bar of T -->
    <rect x="16" y="40" width="64" height="16" rx="8" ry="8" fill="url(#grad-t-top)" />
    <!-- Sparkle Star -->
    <path d="M 48 12 Q 48 20 56 20 Q 48 20 48 28 Q 48 20 40 20 Q 48 20 48 12" fill="url(#grad-star)" />
  </g>

  <!-- Typography -->
  <text x="120" y="145" class="brand-text">Talenta</text>
  
  <!-- Tagline -->
  <text x="120" y="176" class="tagline-text">
    Transformando <tspan fill="#3B82F6" font-weight="700">talento</tspan> em <tspan fill="#7C3AED" font-weight="700">oportunidades</tspan>.
  </text>
</svg>
